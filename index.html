<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Snake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --green: #00e676;
    --green-dim: #1a4a2a;
    --red: #ff4444;
    --amber: #ffaa00;
    --text: #e8e8e8;
    --muted: #555;
    --cell: 20px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: none;
  }

  #custom-cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: var(--green);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    transition: transform 0.05s;
    box-shadow: 0 0 8px var(--green);
  }

  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    user-select: none;
  }

  #title-bar {
    width: 100%;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  #game-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    color: var(--green);
  }

  #game-title span {
    color: var(--muted);
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.1em;
    font-family: 'Space Mono', monospace;
  }

  #hud {
    display: flex;
    gap: 32px;
    margin-bottom: 12px;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    width: 100%;
  }

  .hud-item { display: flex; flex-direction: column; gap: 2px; }
  .hud-label { font-size: 10px; color: var(--muted); }
  .hud-val { font-size: 20px; font-weight: 700; color: var(--text); font-family: 'Syne', sans-serif; }
  .hud-val.green { color: var(--green); }

  #cvs-wrap {
    position: relative;
    border: 1px solid var(--border);
  }

  #cvs-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 19px,
      rgba(255,255,255,0.015) 19px,
      rgba(255,255,255,0.015) 20px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 19px,
      rgba(255,255,255,0.015) 19px,
      rgba(255,255,255,0.015) 20px
    );
    pointer-events: none;
    z-index: 1;
  }

  canvas {
    display: block;
    cursor: none;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    backdrop-filter: blur(2px);
  }

  #overlay h2 {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--green);
    letter-spacing: -1px;
  }

  #overlay .sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  #overlay .final-score {
    font-size: 48px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    color: var(--text);
    margin: 4px 0;
  }

  #start-btn {
    margin-top: 8px;
    padding: 10px 32px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: none;
    transition: background 0.15s, color 0.15s;
  }

  #start-btn:hover {
    background: var(--green);
    color: #000;
  }

  #speed-bar-wrap {
    width: 100%;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #speed-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  #speed-bar-bg {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #speed-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s ease, background 0.3s;
    width: 20%;
  }

  #tip {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
  }

  .dead #overlay h2 { color: var(--red); }
  .dead #start-btn { border-color: var(--red); color: var(--red); }
  .dead #start-btn:hover { background: var(--red); color: #000; }
</style>
</head>
<body>

<div id="custom-cursor"></div>

<div id="wrap">
  <div id="title-bar">
    <div id="game-title">CURSOR SNAKE <span>// MOVE YOUR MOUSE</span></div>
  </div>

  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-val green" id="score">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Best</div>
      <div class="hud-val" id="hi">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Length</div>
      <div class="hud-val" id="length">3</div>
    </div>
  </div>

  <div id="cvs-wrap">
    <canvas id="cvs" width="560" height="420"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">CURSOR SNAKE</h2>
      <div class="sub" id="overlay-sub">Guide the snake with your cursor</div>
      <div class="final-score" id="final-score" style="display:none"></div>
      <button id="start-btn" onclick="startGame()">START</button>
    </div>
  </div>

  <div id="speed-bar-wrap">
    <div id="speed-label">Speed</div>
    <div id="speed-bar-bg"><div id="speed-bar-fill"></div></div>
  </div>

  <div id="tip">Move cursor inside canvas to steer &nbsp;·&nbsp; Eat red apples to grow</div>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub = document.getElementById('overlay-sub');
const finalScoreEl = document.getElementById('final-score');
const scoreEl = document.getElementById('score');
const hiEl = document.getElementById('hi');
const lengthEl = document.getElementById('length');
const speedFill = document.getElementById('speed-bar-fill');
const cursor = document.getElementById('custom-cursor');

const COLS = 28, ROWS = 21, CELL = 20;
let snake, dir, nextDir, food, score, hiScore = 0, running = false, dead = false, tid;
let mx = -999, my = -999;

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

document.getElementById('start-btn').addEventListener('mouseenter', () => {
  cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
});
document.getElementById('start-btn').addEventListener('mouseleave', () => {
  cursor.style.transform = 'translate(-50%,-50%) scale(1)';
});

function getInterval() {
  if (score < 5) return 150;
  if (score < 10) return 120;
  if (score < 20) return 95;
  if (score < 35) return 75;
  return 55;
}

function getSpeedPct() {
  const map = [
    [0, 20], [5, 40], [10, 60], [20, 80], [35, 100]
  ];
  for (let i = map.length - 1; i >= 0; i--) {
    if (score >= map[i][0]) return map[i][1];
  }
  return 20;
}

function updateSpeedBar() {
  const pct = getSpeedPct();
  speedFill.style.width = pct + '%';
  if (pct >= 80) speedFill.style.background = 'var(--red)';
  else if (pct >= 60) speedFill.style.background = 'var(--amber)';
  else speedFill.style.background = 'var(--green)';
}

function placeFood() {
  let f;
  do {
    f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === f.x && s.y === f.y));
  food = f;
}

function startGame() {
  clearTimeout(tid);
  dead = false;
  overlay.style.display = 'none';
  document.getElementById('wrap').classList.remove('dead');
  snake = [{ x: 14, y: 10 }, { x: 13, y: 10 }, { x: 12, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  running = true;
  placeFood();
  updateHUD();
  tick();
}

function updateHUD() {
  scoreEl.textContent = score;
  hiEl.textContent = hiScore;
  lengthEl.textContent = snake.length;
  updateSpeedBar();
}

function steerFromCursor() {
  const rect = cvs.getBoundingClientRect();
  const gx = Math.floor((mx - rect.left) / CELL);
  const gy = Math.floor((my - rect.top) / CELL);
  const head = snake[0];
  const dx = gx - head.x;
  const dy = gy - head.y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
    else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
    else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
  }
}

function tick() {
  if (!running) return;
  steerFromCursor();
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    if (score > hiScore) hiScore = score;
    placeFood();
  } else {
    snake.pop();
  }

  updateHUD();
  draw();
  tid = setTimeout(tick, getInterval());
}

function gameOver() {
  running = false;
  dead = true;
  draw();
  overlay.style.display = 'flex';
  document.getElementById('wrap').classList.add('dead');
  overlayTitle.textContent = 'GAME OVER';
  overlaySub.textContent = score === 0 ? 'Better luck next time' : score < 10 ? 'Not bad, try again' : 'Impressive run';
  finalScoreEl.style.display = 'block';
  finalScoreEl.textContent = score;
  document.getElementById('start-btn').textContent = 'RETRY';
  hiEl.textContent = hiScore;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function hsvToRgb(h, s, v) {
  let r, g, b;
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r=v; g=t; b=p; break;
    case 1: r=q; g=v; b=p; break;
    case 2: r=p; g=v; b=t; break;
    case 3: r=p; g=q; b=v; break;
    case 4: r=t; g=p; b=v; break;
    case 5: r=v; g=p; b=q; break;
  }
  return `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
}

function draw() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);

  // food
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(fx, fy, 7, 0, Math.PI * 2);
  ctx.fill();
  // stem
  ctx.fillStyle = '#666';
  ctx.fillRect(fx - 1, fy - 12, 2, 6);
  // leaf
  ctx.fillStyle = '#00e676';
  ctx.beginPath();
  ctx.ellipse(fx + 5, fy - 10, 5, 2.5, Math.PI / 4, 0, Math.PI * 2);
  ctx.fill();

  // snake
  snake.forEach((seg, i) => {
    const t = i / Math.max(snake.length - 1, 1);
    // green → darker green gradient along body
    const color = hsvToRgb(0.37, lerp(0.4, 0.85, t), lerp(0.9, 0.35, t));
    const r = i === 0 ? 5 : 3;
    const px = seg.x * CELL + 1;
    const py = seg.y * CELL + 1;
    const size = CELL - 2;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(px, py, size, size, r);
    ctx.fill();

    // head eyes
    if (i === 0) {
      const ex = dir.x === 0 ? 5 : dir.x > 0 ? 13 : 4;
      const ex2 = dir.x === 0 ? 13 : dir.x > 0 ? 13 : 4;
      const ey = dir.y === 0 ? 6 : dir.y > 0 ? 14 : 4;
      const ey2 = dir.y === 0 ? 6 : dir.y > 0 ? 14 : 4;
      const ey_b = dir.y === 0 ? 13 : ey;
      const ey2_b = dir.y === 0 ? 13 : ey2;

      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(px + ex, py + ey, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + ex2, py + ey2_b, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(px + ex + 0.8, py + ey - 0.8, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + ex2 + 0.8, py + ey2_b - 0.8, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

// initial idle draw
snake = [{ x: 14, y: 10 }, { x: 13, y: 10 }, { x: 12, y: 10 }];
dir = { x: 1, y: 0 };
food = { x: 20, y: 10 };
draw();
</script>
</body>
</html>
